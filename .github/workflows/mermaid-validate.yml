name: mermaid-validate

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/mermaid_validate.sh"
      - ".github/workflows/mermaid-validate.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/mermaid_validate.sh"

permissions: { contents: read }

jobs:
  parse:
    runs-on: ubuntu-24.04
    # Mermaid CLI relies on Puppeteer + headless Chromium and is fragile in
    # CI (sandbox issues; parser intolerance for some legitimate Markdown).
    # Renders correctly in GitHub's native preview, which is the consumer.
    # We surface parse failures as warnings rather than blocking merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install -g @mermaid-js/mermaid-cli@10.9.1
      - name: Extract and parse every Mermaid block
        run: bash scripts/mermaid_validate.sh || echo "::warning::Mermaid parse failures; check individual blocks"
