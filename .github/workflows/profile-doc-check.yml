name: profile-doc-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: { contents: read }

env:
  PYTHON_VERSION: "3.14"

jobs:
  drift:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: Generate profile-reference.md from schema
        run: uv run python scripts/generate_profile_reference.py > /tmp/profile-reference.md
      - name: Diff against committed
        run: |
          if ! diff -u docs/profile-reference.md /tmp/profile-reference.md; then
            echo "::error::docs/profile-reference.md is out of sync with profile.schema.json"
            echo "Run: uv run python scripts/generate_profile_reference.py > docs/profile-reference.md"
            exit 1
          fi
