# SPEC.md §8.6.5: PRs labeled 'behavior-change' must touch docs/ or runbooks/.
name: behavior-change-docs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions: { contents: read, pull-requests: read }

jobs:
  enforce:
    runs-on: ubuntu-24.04
    if: contains(github.event.pull_request.labels.*.name, 'behavior-change')
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Check for docs/ or runbooks/ change
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base" "$head" | grep -E '^(docs/|runbooks/)' || true)
          if [ -z "$changed" ]; then
            echo "::error::PR labeled 'behavior-change' must modify docs/ or runbooks/"
            exit 1
          fi
          echo "Touched: $changed"
